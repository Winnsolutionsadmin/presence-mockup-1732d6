<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Kindred sandbox - director / owner portal</title><meta name="robots" content="noindex"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>/* Kindred Portal - Design System: Soft Enterprise Editorial */

:root {
  /* Surfaces */
  --surface: #fbf9f8;
  --surface-container-low: #f5f3f3;
  --surface-container-lowest: #fff;
  --surface-container-high: #e8e6e6;
  --surface-container-highest: #dddcdc;

  /* Primary */
  --primary: #38666f;
  --primary-dim: #2b5963;
  --on-primary: #fff;

  /* Secondary */
  --secondary: #849e85;
  --secondary-container: #c8dbc8;
  --on-secondary-container: #1a3a1a;

  /* Tertiary */
  --tertiary: #c4a882;
  --tertiary-container: #e8d5bf;
  --on-tertiary-container: #3d2e1a;

  /* Text */
  --on-surface: #313333;
  --on-surface-variant: #5e5f5f;

  /* Error */
  --error: #ba1a1a;
  --error-container: #ffdad6;

  /* Outline */
  --outline-variant: #b1b2b2;

  /* Shadows & Borders */
  --shadow-soft: 0px 12px 32px rgba(49, 51, 51, 0.06);
  --ghost-border: 1px solid rgba(177, 178, 178, 0.15);

  /* Radii */
  --radius-xl: 1.5rem;
  --radius-lg: 1rem;
  --radius-sm: 0.25rem;
  --radius-full: 9999px;

  /* Fonts */
  --font-display: 'Manrope', sans-serif;
  --font-body: 'Inter', sans-serif;

  /* Type scale (values equal the existing hardcoded sizes — identity, not rounding) */
  --fs-2xs: 0.625rem;  /* ~10px */
  --fs-xs:  0.6875rem; /* ~11px */
  --fs-sm:  0.75rem;   /* ~12px */
  --fs-md:  0.8125rem; /* ~13px — primary name on roster cards */
  --fs-lg:  0.9375rem; /* ~15px */
  --fs-xl:  1.0625rem; /* ~17px — room headers (keep exact) */

  /* Spacing scale */
  --sp-1: 4px;
  --sp-2: 8px;
  --sp-3: 12px;
  --sp-4: 16px;
  --sp-5: 18px;
  --sp-6: 22px;

  /* Card radius (Transitions cards already use 12 consistently) */
  --radius-card: 12px;

  /* Transition (Transitions view) semantic colors — map 1:1 to the existing hex,
     EXCEPT --tr-muted / --tr-dim which are intentionally darkened for contrast. */
  --tr-in-bg: #e8f0e8;
  --tr-in-text: #1f5a2e;
  --tr-in-sub: #5a8c6a;
  --tr-in-arrow: #4a8c5c;
  --tr-out-bg: #fce8e6;
  --tr-out-text: #8b2020;
  --tr-out-sub: #b07575;
  --tr-out-arrow: #c06060;
  --tr-stable-bg: #ffffff;
  --tr-open-bg: #fafafa;
  --tr-name: #313333;
  --tr-room: #38666f;
  --tr-warn: #d4a843;
  --tr-rule: rgba(0, 0, 0, 0.08);
  --tr-muted: #6b6c6c;   /* CONTRAST FIX: was #7a7a7a */
  --tr-dim: #9a9b9b;     /* CONTRAST FIX: was #9aa / #bdbdbd */
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
}

body {
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  color: var(--on-surface);
  background: var(--surface);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#root {
  height: 100%;
}

h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-display);
  color: var(--on-surface);
  font-weight: 700;
}

/* Typography scale */
.display-lg {
  font-family: var(--font-display);
  font-size: 3rem;
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.02em;
}

.headline-lg {
  font-family: var(--font-display);
  font-size: 1.75rem;
  font-weight: 700;
  line-height: 1.2;
}

.headline-md {
  font-family: var(--font-display);
  font-size: 1.25rem;
  font-weight: 600;
  line-height: 1.3;
}

.label-lg {
  font-family: var(--font-body);
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--on-surface-variant);
}

.label-sm {
  font-family: var(--font-body);
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--on-surface-variant);
}

/* Transitions roster cards: add hover/focus affordance to inline-styled cards
   (layout stays inline; this class only adds box-shadow/transform/outline). */
.tr-card {
  transition: box-shadow 0.12s ease, transform 0.12s ease;
}
.tr-card:hover {
  box-shadow: var(--shadow-soft);
}
.tr-card:focus-visible {
  outline: 2px solid var(--primary);
  outline-offset: 1px;
}

/* ================================================================
   Agenda (Directors' Task & Operations cockpit)
   ================================================================ */

/* Pressed/active feedback on a task card (layout stays inline). The opacity transition
   gives a subtle fade when a task flips to done (inline style drops opacity to 0.7). */
.agenda-card {
  transition: box-shadow 0.12s ease, transform 0.08s ease, opacity 0.18s ease, border-color 0.12s ease;
}
.agenda-card:active {
  transform: scale(0.997);
}

/* Filter row wraps; on narrow screens drop to a 2-up grid so selects stay tappable. */
.agenda-filters {
  flex-wrap: wrap;
}
@media (max-width: 600px) {
  .agenda-filters {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .agenda-filters > select {
    width: 100%;
  }
}

/* Create-task / template-picker modal width (inline styles set the rest). */
.agenda-create-modal {
  width: min(480px, 94vw);
}

/* Template-picker rows: subtle hover (selection styling is inline). */
.agenda-template-row {
  transition: background 0.1s ease, border-color 0.1s ease;
}
.agenda-template-row:hover {
  border-color: var(--primary);
}

/* Reporting strip tiles already wrap (inline flex-wrap); on the narrowest screens force
   a 2-up grid so four tiles read as two tidy rows instead of one cramped line. */
@media (max-width: 520px) {
  .agenda-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
}

/* Failure toast: gentle slide-up + fade in. */
.agenda-toast {
  animation: agenda-toast-in 0.18s ease-out;
}
@keyframes agenda-toast-in {
  from { opacity: 0; transform: translate(-50%, 8px); }
  to   { opacity: 1; transform: translate(-50%, 0); }
}

/* Header action toolbar: buttons wrap; on very narrow screens they go full-width so
   "Onboard new hire" / "From Template" / "New Task" stay tappable and don't truncate. */
@media (max-width: 480px) {
  .agenda-toolbar {
    width: 100%;
  }
  .agenda-toolbar > button {
    flex: 1 1 100%;
    justify-content: center;
  }
}

/* ================================================================
   Families / CRM table
   ================================================================ */
.crm-row {
  transition: background 0.1s ease;
}
.crm-row:hover {
  background: var(--surface-container-low);
}

/* ================================================================
   Home (modular dashboard)
   ================================================================ */
.home-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 1rem;
}
.home-grid-cell {
  min-width: 0;
}
@media (max-width: 980px) {
  .home-grid-cell {
    grid-column: span 6 !important;
  }
}

.home-module {
  transition: box-shadow 0.12s ease;
  height: 100%;
}
.home-module:hover {
  box-shadow: 0px 14px 36px rgba(49, 51, 51, 0.09);
}

/* Live-feed dot: a slow, quiet breath. Stilled for reduced motion. */
.home-live-dot {
  animation: home-live-breathe 2.6s ease-in-out infinite;
}
@keyframes home-live-breathe {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.45; }
}
@media (prefers-reduced-motion: reduce) {
  .home-live-dot {
    animation: none;
  }
}

/* ================================================================
   Responsive: collapse the sidebar to an icon rail + tighten main
   padding on small screens. The sidebar labels hide; icons remain.
   ================================================================ */
@media (max-width: 768px) {
  aside {
    width: 60px !important;
    padding-left: 0.375rem !important;
    padding-right: 0.375rem !important;
  }
  aside nav a span,
  aside > div:first-child,
  aside button span {
    display: none;
  }
  aside nav a {
    justify-content: center;
  }
  main {
    padding: 1rem !important;
  }
}

/* ================================================================
   Mobile sidebar: full off-canvas hamburger drawer (Fix #1, visual QA
   2026-07-12). Below 600px the >768px icon-rail collapse above is replaced
   entirely - the sidebar was found permanently eating ~56px on a 390px
   screen with no way to reach any nav item. Trigger/backdrop/close are
   hidden by default (desktop + tablet icon-rail); this block turns them on
   and overrides the icon-rail rules with the full off-canvas drawer.
   ================================================================ */
.sidebar-hamburger,
.sidebar-backdrop,
.sidebar-close {
  display: none;
}

@media (max-width: 600px) {
  aside {
    position: fixed !important;
    top: 0;
    bottom: 0;
    left: 0;
    width: 240px !important;
    max-width: 82vw;
    min-height: 100vh;
    z-index: 200;
    transform: translateX(-100%);
    transition: transform 0.2s ease;
    padding-left: 1rem !important;
    padding-right: 1rem !important;
    overflow-y: auto;
  }
  aside.sidebar-mobile-open {
    transform: translateX(0);
    box-shadow: 0px 24px 64px rgba(49, 51, 51, 0.28);
  }
  /* Restore full labels inside the drawer - the >768px icon-rail rule above
     hides these, but the drawer has room and needs them. */
  aside nav a span,
  aside > div:first-child,
  aside button span {
    display: inline !important;
  }
  aside > div:first-child {
    display: flex !important;
  }
  aside nav a {
    justify-content: flex-start;
  }
  .sidebar-hamburger {
    display: flex;
    position: fixed;
    top: 0.75rem;
    left: 0.75rem;
    z-index: 150;
    width: 40px;
    height: 40px;
    align-items: center;
    justify-content: center;
    background: var(--surface-container-lowest);
    border: 1px solid var(--outline-variant);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-soft);
    cursor: pointer;
  }
  .sidebar-backdrop {
    display: block;
    position: fixed;
    inset: 0;
    background: rgba(30, 32, 32, 0.42);
    z-index: 190;
  }
  .sidebar-close {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    background: none;
    border: none;
    cursor: pointer;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
  }
  .topbar {
    padding-left: 3.25rem !important;
  }
  main {
    padding-top: 3.5rem !important;
  }
}

/* ================================================================
   Documents audit grid: mobile/tablet horizontal-scroll affordance
   (Fix #1, visual QA 2026-07-12). The Child column stays sticky (existing
   inline styles); this adds a visible hint banner + a right-edge fade so a
   21-column grid never reads as "broken" on a narrow screen with no cue
   that there is more content to the right.
   ================================================================ */
.docs-scroll-hint,
.docs-scroll-fade {
  display: none;
}
@media (max-width: 900px) {
  .docs-scroll-hint {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    font-size: var(--fs-xs);
    font-weight: 700;
    color: var(--primary);
    background: color-mix(in srgb, var(--primary) 8%, var(--surface-container-lowest));
    padding: 0.4rem 0.75rem;
    border-bottom: 1px solid var(--outline-variant);
  }
  .docs-scroll-fade {
    display: block;
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 22px;
    background: linear-gradient(to right, transparent, rgba(49, 51, 51, 0.12));
    pointer-events: none;
  }
}

/* ================================================================
   Documents audit grid: column-header action menu (Fix #2, visual QA
   2026-07-12). Blank-download / Upload-Replace move off the always-visible
   header into a hover/focus-revealed panel so the header itself only shows
   title + split count.
   ================================================================ */
.doc-col-menu-trigger {
  opacity: 0.5;
  transition: opacity 0.12s ease;
}
.doc-col-menu-wrap:hover .doc-col-menu-trigger,
.doc-col-menu-wrap:focus-within .doc-col-menu-trigger {
  opacity: 1;
}
.doc-col-menu-panel {
  opacity: 0;
  pointer-events: none;
  transform: translateY(-4px);
  transition: opacity 0.12s ease, transform 0.12s ease;
}
.doc-col-menu-wrap:hover .doc-col-menu-panel,
.doc-col-menu-wrap:focus-within .doc-col-menu-panel {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}
